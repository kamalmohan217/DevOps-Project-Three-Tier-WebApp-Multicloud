# kubectl create secret tls ingress-secret --key mykey.key --cert STAR_singhritesh85_com.crt -n three-tier-webapp
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: three-tier-webapp-gateway
  namespace: three-tier-webapp
spec:
  gatewayClassName: nginx # e.g., "nginx"
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "3tierwebapp.singhritesh85.com"
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "3tierwebapp.singhritesh85.com"
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: ingress-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: three-tier-webapp-http-to-https-redirect
  namespace: three-tier-webapp
spec:
  parentRefs:
  - name: three-tier-webapp-gateway
    namespace: three-tier-webapp
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301 # Use 301 for permanent redirect
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: three-tier-webapp-route-https
  namespace: three-tier-webapp
spec:
  parentRefs:
  - name: three-tier-webapp-gateway
    namespace: three-tier-webapp
    sectionName: https
  hostnames:
  - "3tierwebapp.singhritesh85.com"
  rules:
  - backendRefs:
    - name: threetierwebapp-folo # Name of the Service created by the Helm chart
      port: 80
